<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aria — Ghost Noise</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Barlow:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #111111;
      --card: #1a1a1a;
      --accent: #1a6bff;
      --white: #ffffff;
      --muted: #cccccc;
      --border: #2a2a2a;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--white);
      font-family: 'Barlow', sans-serif;
      font-size: 15px;
      line-height: 1.6;
      overflow: hidden;
    }

    /* ── HEADER ── */
    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 10;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      height: 56px;
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 10px;
    }

    .wordmark {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      font-size: 20px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--white);
      line-height: 1;
    }

    .wordmark-slash {
      color: var(--accent);
    }

    .online-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      margin-left: 2px;
      animation: pulse 2s ease-in-out infinite;
      flex-shrink: 0;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.45; transform: scale(0.8); }
    }

    .header-label {
      margin-left: auto;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 3px 8px;
    }

    /* ── LAYOUT ── */
    .layout {
      display: flex;
      flex-direction: column;
      height: 100vh;
      padding-top: 56px;
      padding-bottom: 112px;
    }

    /* ── PORTAL LABEL ── */
    .portal-label {
      text-align: center;
      padding: 18px 0 12px;
      flex-shrink: 0;
    }

    .portal-label span {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 4px 10px;
    }

    /* ── MESSAGES ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px 0 8px;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .message-row {
      display: flex;
      padding: 6px 24px;
    }

    .message-row.user { justify-content: flex-end; }
    .message-row.aria { justify-content: flex-start; }

    .bubble {
      max-width: 72%;
      padding: 12px 16px;
      border-radius: 4px;
      line-height: 1.65;
      color: var(--white);
      font-size: 15px;
    }

    .bubble.user {
      background: var(--accent);
      color: var(--white);
    }

    .bubble.aria {
      background: var(--card);
      border-left: 3px solid var(--accent);
      color: var(--muted);
    }

    /* Markdown rendering inside bubbles */
    .bubble strong { color: var(--white); font-weight: 600; }
    .bubble em { font-style: italic; color: #e0e0e0; }
    .bubble code {
      font-family: 'Courier New', monospace;
      font-size: 13px;
      background: rgba(255,255,255,0.08);
      padding: 1px 5px;
      border-radius: 3px;
      color: #a8d8ff;
    }
    .bubble ul, .bubble ol {
      padding-left: 20px;
      margin: 6px 0;
    }
    .bubble li { margin: 3px 0; }
    .bubble p { margin: 6px 0; }
    .bubble p:first-child { margin-top: 0; }
    .bubble p:last-child { margin-bottom: 0; }

    /* ── TYPING INDICATOR ── */
    .typing-row {
      display: flex;
      padding: 6px 24px;
    }

    .typing-bubble {
      background: var(--card);
      border-left: 3px solid var(--accent);
      padding: 12px 18px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
      animation: bounce 1.2s ease-in-out infinite;
    }
    .dot:nth-child(1) { animation-delay: 0s; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.5; }
      40% { transform: translateY(-6px); opacity: 1; }
    }

    /* ── INPUT AREA ── */
    .input-area {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }

    #user-input {
      flex: 1;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--white);
      font-family: 'Barlow', sans-serif;
      font-size: 15px;
      line-height: 1.5;
      padding: 10px 14px;
      border-radius: 4px;
      resize: none;
      min-height: 44px;
      max-height: 140px;
      outline: none;
      transition: border-color 0.15s;
    }

    #user-input::placeholder { color: #555; }
    #user-input:focus { border-color: var(--accent); }

    #send-btn {
      background: var(--accent);
      color: var(--white);
      border: none;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0 20px;
      height: 44px;
      border-radius: 4px;
      cursor: pointer;
      flex-shrink: 0;
      transition: opacity 0.15s;
    }

    #send-btn:hover { opacity: 0.88; }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── ERROR MESSAGE ── */
    .error-bubble {
      background: #2a1a1a;
      border-left: 3px solid #ff4444;
      color: #ff9999;
      font-size: 14px;
      padding: 10px 14px;
      border-radius: 4px;
      max-width: 72%;
    }

    @media (max-width: 600px) {
      .bubble { max-width: 90%; }
      .header-label { display: none; }
    }
  </style>
</head>
<body>

  <header>
    <div class="wordmark">Ghost Noise <span class="wordmark-slash">/ Aria</span></div>
    <div class="online-dot"></div>
    <div class="header-label">Staff Portal</div>
  </header>

  <div class="layout">
    <div class="portal-label">
      <span>Ghost Noise Staff Portal</span>
    </div>

    <div id="messages"></div>
  </div>

  <div class="input-area">
    <textarea
      id="user-input"
      placeholder="Ask Aria anything about Ghost Noise..."
      rows="1"
    ></textarea>
    <button id="send-btn">Send</button>
  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');

    // Conversation history in Anthropic message format
    let history = [];
    let isStreaming = false;

    // ── Markdown renderer (regex-based) ──
    function renderMarkdown(text) {
      // Escape HTML
      let html = text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');

      // Inline code (before bold/italic to avoid conflicts)
      html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

      // Bold
      html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      html = html.replace(/__(.+?)__/g, '<strong>$1</strong>');

      // Italic
      html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
      html = html.replace(/_(.+?)_/g, '<em>$1</em>');

      // Convert lines into paragraphs / lists
      const lines = html.split('\n');
      const output = [];
      let inList = false;

      for (let i = 0; i < lines.length; i++) {
        const line = lines[i];
        const listMatch = line.match(/^(\s*[-*•]\s+)(.*)$/);

        if (listMatch) {
          if (!inList) { output.push('<ul>'); inList = true; }
          output.push(`<li>${listMatch[2]}</li>`);
        } else {
          if (inList) { output.push('</ul>'); inList = false; }
          if (line.trim() === '') {
            output.push('');
          } else {
            output.push(`<p>${line}</p>`);
          }
        }
      }
      if (inList) output.push('</ul>');

      return output.join('');
    }

    // ── Append a message bubble ──
    function appendMessage(role, text) {
      const row = document.createElement('div');
      row.className = `message-row ${role}`;

      const bubble = document.createElement('div');
      bubble.className = `bubble ${role}`;

      if (role === 'aria') {
        bubble.innerHTML = renderMarkdown(text);
      } else {
        bubble.textContent = text;
      }

      row.appendChild(bubble);
      messagesEl.appendChild(row);
      scrollToBottom();
      return bubble;
    }

    function appendError(msg) {
      const row = document.createElement('div');
      row.className = 'message-row aria';
      const bubble = document.createElement('div');
      bubble.className = 'error-bubble';
      bubble.textContent = msg;
      row.appendChild(bubble);
      messagesEl.appendChild(row);
      scrollToBottom();
    }

    // ── Typing indicator ──
    let typingRow = null;

    function showTyping() {
      typingRow = document.createElement('div');
      typingRow.className = 'typing-row';
      typingRow.innerHTML = `
        <div class="typing-bubble">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>`;
      messagesEl.appendChild(typingRow);
      scrollToBottom();
    }

    function hideTyping() {
      if (typingRow) {
        typingRow.remove();
        typingRow = null;
      }
    }

    function scrollToBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    // ── Send message ──
    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text || isStreaming) return;

      isStreaming = true;
      sendBtn.disabled = true;
      inputEl.value = '';
      autoResize();

      appendMessage('user', text);
      history.push({ role: 'user', content: text });

      showTyping();

      try {
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: history }),
        });

        if (!response.ok) {
          const err = await response.json().catch(() => ({ error: 'Unknown error' }));
          hideTyping();
          appendError(`Error: ${err.error || response.statusText}`);
          history.pop();
          return;
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let ariaBubble = null;
        let fullText = '';
        let buffer = '';

        hideTyping();

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const parts = buffer.split('\n\n');
          buffer = parts.pop(); // keep incomplete chunk

          for (const part of parts) {
            if (!part.startsWith('data: ')) continue;
            const payload = part.slice(6).trim();
            if (payload === '[DONE]') break;

            let parsed;
            try { parsed = JSON.parse(payload); } catch { continue; }

            if (parsed.error) {
              if (ariaBubble) {
                ariaBubble.innerHTML += `<p style="color:#ff9999;margin-top:6px;">[Stream error: ${parsed.error}]</p>`;
              } else {
                appendError(`Stream error: ${parsed.error}`);
              }
              break;
            }

            if (parsed.delta) {
              fullText += parsed.delta;
              if (!ariaBubble) {
                const row = document.createElement('div');
                row.className = 'message-row aria';
                ariaBubble = document.createElement('div');
                ariaBubble.className = 'bubble aria';
                row.appendChild(ariaBubble);
                messagesEl.appendChild(row);
              }
              ariaBubble.innerHTML = renderMarkdown(fullText);
              scrollToBottom();
            }
          }
        }

        if (fullText) {
          history.push({ role: 'assistant', content: fullText });
        }
      } catch (err) {
        hideTyping();
        appendError(`Connection error: ${err.message}`);
        history.pop();
      } finally {
        isStreaming = false;
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }

    // ── Auto-resize textarea ──
    function autoResize() {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
    }

    inputEl.addEventListener('input', autoResize);

    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    sendBtn.addEventListener('click', sendMessage);

    // ── Welcome message ──
    window.addEventListener('DOMContentLoaded', () => {
      appendMessage('aria', "Hey, I'm Aria. Ask me anything about Ghost Noise operations, events, contacts, or anything else in the vault.");
      inputEl.focus();
    });
  </script>
</body>
</html>
